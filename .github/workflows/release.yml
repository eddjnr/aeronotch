name: Release

on:
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Get next version
        id: version
        shell: bash
        run: |
          NEXT_VERSION=$(node -e '
            const { execSync } = require("child_process");
            function tagExists(v) {
              try {
                return execSync("git tag -l v" + v, { encoding: "utf8", stdio: "pipe" }).trim() !== "";
              } catch {
                return false;
              }
            }
            const current = require("./package.json").version;
            let next = current;
            if (tagExists(next)) {
              const parts = next.split(".").map(Number);
              next = parts[0] + "." + parts[1] + "." + (parts[2] + 1);
              while (tagExists(next)) {
                const p = next.split(".").map(Number);
                next = p[0] + "." + p[1] + "." + (p[2] + 1);
              }
            }
            console.log(next);
          ')
          echo "new_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          DELIM="EOF_CHANGELOG"
          node scripts/generate-changelog.js ${{ steps.version.outputs.new_version }} > /tmp/changelog.md
          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/changelog.md >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Bump version and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          node scripts/bump-version.js ${{ steps.version.outputs.new_version }}
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock src/components/settings/SettingsPanel.tsx src/i18n/translations.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to v${{ steps.version.outputs.new_version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No version bump changes to commit"
          fi
        shell: bash

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v__VERSION__'
          releaseName: 'AeroNotch v__VERSION__'
          releaseDraft: false
          prerelease: false
          releaseBody: ${{ steps.changelog.outputs.body }}
