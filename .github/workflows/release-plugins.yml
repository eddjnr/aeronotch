name: Release Plugins

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-plugins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changes and auto-bump versions
        run: node scripts/auto-release-plugins.mjs

      - name: Build plugins
        run: pnpm plugins:build

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy-dist/plugins
          # Copy each plugin's dist content to deploy-dist/plugins/<plugin-id>/
          for plugin_dir in plugins/*; do
            if [ -d "$plugin_dir" ]; then
              plugin_name=$(basename "$plugin_dir")
              if [ "$plugin_name" != "registry.json" ] && [ -d "$plugin_dir/dist" ]; then
                echo "Copying built assets for plugin: $plugin_name"
                mkdir -p "deploy-dist/plugins/$plugin_name"
                cp -r "$plugin_dir/dist"/* "deploy-dist/plugins/$plugin_name/"
              fi
            fi
          done
          # Copy global registry.json if exists
          if [ -f "plugins/registry.json" ]; then
            cp plugins/registry.json deploy-dist/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy-dist
          branch: gh-pages
          clean: false
